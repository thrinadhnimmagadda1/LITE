services:
  # Backend Service
  - type: web
    name: lite-backend
    env: python
    buildCommand: |
      pip install -r backend/requirements.txt
      python backend/manage.py migrate
      python backend/manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --chdir backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: 'False'
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
    plan: free

# NOTE:
# Render's Blueprint validator is rejecting static site definitions in this file
# for this workspace. Create the frontend as a separate Render Static Site in
# the UI with:
# - Build command: npm install && npm run build
# - Publish directory: build
# - Env var: REACT_APP_API_URL=https://lite-backend.onrender.com/api
